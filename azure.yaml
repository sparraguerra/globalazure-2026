# Azure Developer CLI (azd) configuration
# Deploys the Agentic Content Factory to Azure Container Apps

name: content-agent-factory
metadata:
  template: content-agent-factory@0.0.1
  description: Multi-agent content factory with Azure Container Apps, Foundry AI, and OTEL telemetry

services:
  agent-research:
    project: ./Lab/src/agent-research
    language: python
    host: containerapp
    docker:
      path: ./Dockerfile
      context: .
      remoteBuild: true

  agent-creator:
    project: ./Lab/src/agent-creator/AgentCreator
    language: dotnet
    host: containerapp
    docker:
      path: ../Dockerfile
      context: ..
      remoteBuild: true

  dev-ui:
    project: ./Lab/src/dev-ui
    language: js
    host: containerapp
    docker:
      path: ./Dockerfile
      context: .
      remoteBuild: true

  agent-podcaster:
    project: ./Lab/src/agent-podcaster
    language: python
    host: containerapp
    docker:
      path: ./Dockerfile
      context: .
      remoteBuild: true

  # GPU TTS server -- only deployed when contentFactoryMode=full
  # Uncomment to enable full mode with GPU XTTS-v2:
  # tts-server:
  #   project: ./Lab/src/tts-server
  #   language: python
  #   host: containerapp
  #   docker:
  #     path: ./Dockerfile
  #     context: .
  #     remoteBuild: true

infra:
  path: ./infra
  module: main
